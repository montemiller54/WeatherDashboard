<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almanac Card - Modern CSS Prototype</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('Images/NightClear.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            font-family: Calibri, sans-serif;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, #1a1a3e, #0a0a1a);
            z-index: -1;
        }

        .almanac-card {
            position: absolute;
            bottom: 45%;
            right: 2vmin;
            width: clamp(144px, 33.6vmin, 408px);
            aspect-ratio: 1.3 / 1;
            background: rgba(0, 0, 0, 0.8);
            border-radius: clamp(10px, 1.8vmin, 24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Calibri, sans-serif;
            cursor: pointer;
        }

        .almanac-card-title {
            font-size: clamp(1.2rem, 4vmin, 2.6rem);
            font-weight: bold;
            color: #C9D1D9;
            margin-top: 4%;
            white-space: nowrap;
        }

        .almanac-card-body {
            display: flex;
            flex: 1;
            width: 100%;
            padding: 0 8%;
        }

        .almanac-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2%;
        }

        .almanac-label {
            font-size: clamp(0.6rem, 2vmin, 1.2rem);
            color: #8B949E;
        }

        .almanac-value {
            font-size: clamp(1.2rem, 4vmin, 2.6rem);
            color: #E6EDF3;
            margin-bottom: 6%;
        }

        /* Demo controls */
        .demo-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .demo-controls p {
            margin-top: 10px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="almanac-card" onclick="window.location.href='Almanac.html'">
        <div class="almanac-card-title" id="dateTitle">Thur, Mar 19th</div>
        <div class="almanac-card-body">
            <div class="almanac-col">
                <div class="almanac-label">Sunrise</div>
                <div class="almanac-value">7:15</div>
                <div class="almanac-label">Sunset</div>
                <div class="almanac-value">7:32</div>
            </div>
            <div class="almanac-col">
                <div class="almanac-label">Avg High</div>
                <div class="almanac-value">54°</div>
                <div class="almanac-label">Avg Low</div>
                <div class="almanac-value">32°</div>
            </div>
        </div>
    </div>

    <!-- Demo controls -->
    <div class="demo-controls">
        <p>Try resizing the browser window!<br>
        Clicks navigate to Almanac.html</p>
    </div>
</body>
</html>
