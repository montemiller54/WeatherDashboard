<html>

<head>
    <meta charset="utf-8">
    <title>Weather Dashboard</title>
    <!-- Amplify auto-deploy test -->
    <script src="https://unpkg.com/react@16/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@16/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6.15.0/babel.min.js"></script>

    <!-- Load Luxon core first -->
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>

    <!-- Load Chart.js next (UMD version is critical) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Chart.js annotation plugin for freezing line -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

    <!-- Then load the Chart.js Luxon adapter -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>

    <!-- Include configuration file (API keys) -->
    <script src="config.js"></script>
    <!-- Include location service -->
    <script src="locationService.js"></script>
    <!-- Include external script file -->
    <script src="BasicChartScript.js"></script>
    <!-- Include external style sheet -->
    <link rel="stylesheet" type="text/css" href="BasicChartStyle.css">

    <style type="text/css" media="screen">
        #container {
            display: block;
            padding: 0px;
            position: absolute;
            top: 0%;
            left: 0%;
            width: 100%;
            height: 100%;
            background-image: none;
            background-color: black;
            background-size: cover; /* Stretch the background image to cover the container */
            background-repeat: no-repeat; /* Prevent the background image from tiling */
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: stretch;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: calc(35% - 15px);
            background-color: black; /* Set the background color to black */
        }

        .day-summary-container {
            font-family: Calibri, sans-serif;
            background-color: black;
            padding-top: 5px;
            padding-bottom: 0;
            width: 100%;
            pointer-events: none;
            position: relative;
            top: 5px; /* ← Adjust this to control overlap */

        }

        .day-summary-inner {
            display: flex;
            justify-content: space-between;
            margin-left: 5%;
            margin-right: 6%;
            pointer-events: none;
        }

        .day-summary {
            font-family: Calibri, sans-serif;
            text-align: center;
            flex: 1;
            border: 0.2px solid #444;
            box-sizing: border-box;
            pointer-events: none;
        }

        /* Location Modal Styles */
        .location-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .location-modal {
            background-color: #1a1a2e;
            border-radius: 15px;
            padding: 30px;
            min-width: 320px;
            max-width: 90%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        .location-modal h2 {
            color: white;
            font-family: Calibri, sans-serif;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }

        .location-modal input {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #2a2a3e;
            color: white;
            font-family: Calibri, sans-serif;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .location-modal input:focus {
            outline: none;
            border-color: #6688cc;
        }

        .location-modal-preview {
            color: #a0a0a0;
            font-family: Calibri, sans-serif;
            text-align: center;
            margin-bottom: 15px;
            min-height: 24px;
        }

        .location-modal-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .location-modal button {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: Calibri, sans-serif;
            transition: background-color 0.2s;
        }

        .location-modal button.cancel {
            background-color: #444;
            color: white;
        }

        .location-modal button.cancel:hover {
            background-color: #555;
        }

        .location-modal button.save {
            background-color: #6688cc;
            color: white;
        }

        .location-modal button.save:hover {
            background-color: #7799dd;
        }

        .location-modal button.save:disabled {
            background-color: #444;
            cursor: not-allowed;
        }

        .location-modal-error {
            color: #ff6b6b;
            font-family: Calibri, sans-serif;
            text-align: center;
            margin-bottom: 10px;
        }

        .location-clickable {
            cursor: pointer;
        }

        .location-clickable:hover {
            fill: #c0c0c0 !important;
        }

        /* Modern CSS Temperature Circle */
        .temp-circle {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(158px, 37.8vmin, 400px);
            aspect-ratio: 1;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.8);
            border: clamp(7px, 1.54vmin, 20px) solid var(--temp-color, red);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--temp-color, red);
            font-family: Calibri, sans-serif;
            z-index: 10;
        }

        .hi-lo {
            color: gray;
            font-size: clamp(1.1rem, 4vmin, 2.3rem);
            position: relative;
            top: -10%;
        }

        .current-temp {
            font-size: clamp(3.8rem, 22vmin, 11rem);
            line-height: 0.85;
            position: relative;
        }

        .degree {
            font-size: 0.35em;
            position: absolute;
            top: 0.1em;
            margin-left: 0.05em;
        }

        .feels-like {
            color: gray;
            font-size: clamp(1rem, 3.2vmin, 1.8rem);
            position: relative;
            top: 8%;
        }

        .css-location {
            position: absolute;
            top: calc(25% + 20.5vmin + 2.5vh);
            left: 50%;
            transform: translateX(-50%);
            color: black;
            font-size: clamp(1.05rem, 3.36vmin, 2rem);
            font-family: Calibri, sans-serif;
            cursor: pointer;
            text-shadow:
                -1px -1px 0 lightgray,
                1px -1px 0 lightgray,
                -1px 1px 0 lightgray,
                1px 1px 0 lightgray;
            z-index: 10;
            white-space: nowrap;
        }

        .css-location:hover {
            color: #333;
        }

        .radar-btn {
            position: absolute;
            top: calc(25% + 20.5vmin + 2.5vh - 2px + 0.5 * clamp(1.05rem, 3.36vmin, 2rem));
            left: calc(50% + clamp(45px, 12vmin, 120px));
            transform: translateY(-50%);
            z-index: 10;
            cursor: pointer;
            background: #6688cc;
            border: 2px solid #c0c0c0;
            border-radius: clamp(4px, 0.8vmin, 8px);
            padding: clamp(3px, 0.6vmin, 6px) clamp(6px, 1.2vmin, 12px);
            color: #d0d0d0;
            font-family: Calibri, sans-serif;
            font-size: clamp(0.55rem, 1.8vmin, 0.9rem);
            text-align: center;
            line-height: 1.2;
            opacity: 0.9;
            transition: opacity 0.2s;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
        }
        .radar-btn:hover {
            opacity: 1;
        }

        /* Modern CSS Wind Card */
        .wind-card {
            position: absolute;
            bottom: 47%;
            left: 2vmin;
            width: clamp(144px, 33.6vmin, 408px);
            height: clamp(101px, 23vmin, 285px);
            background: rgba(0, 0, 0, 0.8);
            border-radius: clamp(10px, 1.8vmin, 24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Calibri, sans-serif;
            color: #6688cc;
            z-index: 10;
        }

        .wind-card-label {
            font-size: clamp(1.68rem, 5.52vmin, 3.48rem);
            font-weight: bold;
            margin-top: 4%;
        }

        .wind-card-body {
            display: flex;
            flex: 1;
            width: 100%;
            align-items: flex-end;
            padding-bottom: 5%;
        }

        .wind-card-left {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8%;
            transform: translateX(15%);
        }

        .wind-dir-arrow {
            width: clamp(42px, 9vmin, 102px);
            height: clamp(42px, 9vmin, 102px);
            transition: transform 0.5s ease;
        }

        .wind-dir-text {
            font-size: clamp(1.08rem, 2.88vmin, 1.8rem);
            margin-top: 14%;
        }

        .wind-card-right {
            flex: 0 0 60%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .wind-speed {
            font-size: clamp(3.6rem, 11.4vmin, 7.8rem);
            line-height: 0.9;
        }

        .wind-uom {
            font-size: clamp(1.08rem, 2.88vmin, 1.8rem);
            margin-top: 0.2em;
        }

        /* Modern CSS Humidity Card */
        .humidity-card {
            position: absolute;
            top: 2vmin;
            left: 2vmin;
            width: clamp(144px, 33.6vmin, 408px);
            aspect-ratio: 1.41 / 1;
            background: rgba(0, 0, 0, 0.8);
            border-radius: clamp(10px, 1.8vmin, 24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Calibri, sans-serif;
            color: #00b050;
            z-index: 10;
        }

        .humidity-card-label {
            font-size: clamp(1.68rem, 5.52vmin, 3.48rem);
            font-weight: bold;
            margin-top: 2%;
        }

        .humidity-card-body {
            display: flex;
            flex: 1;
            width: 100%;
            align-items: flex-start;
            padding-top: 2%;
            transform: translateX(-2%);
        }

        .humidity-card-left {
            flex: 0 0 35%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-start;
            height: 100%;
            padding-right: 2%;
            padding-top: 2%;
        }

        .humidity-icon {
            height: clamp(65px, 14vmin, 160px);
            width: auto;
            transform: translateX(20%);
        }

        .humidity-card-right {
            flex: 0 0 65%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .humidity-value {
            font-size: clamp(3.6rem, 11.4vmin, 7.8rem);
            line-height: 0.9;
        }

        .humidity-uom {
            font-size: clamp(1.08rem, 2.88vmin, 1.8rem);
            margin-top: 0.2em;
        }

        /* Modern CSS Rainfall Card */
        .rainfall-card {
            position: absolute;
            top: 2vmin;
            right: 2vmin;
            width: clamp(144px, 33.6vmin, 408px);
            height: clamp(102px, 23.8vmin, 289px);
            overflow: hidden;
            background: rgba(0, 0, 0, 0.8);
            border-radius: clamp(10px, 1.8vmin, 24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Calibri, sans-serif;
            color: #2653ff;
            cursor: pointer;
            z-index: 10;
        }

        .rainfall-card-label {
            font-size: clamp(1.68rem, 5.52vmin, 3.48rem);
            font-weight: bold;
            margin-top: 4%;
        }

        .rainfall-card-body {
            display: flex;
            flex: 1;
            width: 100%;
            align-items: center;
            padding-bottom: 8%;
        }

        .rainfall-card-left {
            flex: 0 0 35%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-end;
            height: 100%;
            padding-right: 2%;
            padding-bottom: 2%;
        }

        .rainfall-icon {
            height: clamp(58px, 12.5vmin, 146px);
            width: auto;
            transform: translateX(20%);
        }

        .rainfall-card-right {
            flex: 0 0 65%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .rainfall-value {
            font-size: clamp(3.6rem, 11.4vmin, 7.8rem);
            line-height: 0.9;
        }

        .rainfall-uom {
            font-size: clamp(1.3rem, 3.4vmin, 2.1rem);
            margin-top: 0.2em;
        }

        /* Modern CSS Almanac Card */
        .almanac-card {
            position: absolute;
            bottom: 47%;
            right: 2vmin;
            width: clamp(144px, 33.6vmin, 408px);
            height: clamp(101px, 23vmin, 285px);
            background: rgba(0, 0, 0, 0.8);
            border-radius: clamp(10px, 1.8vmin, 24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Calibri, sans-serif;
            cursor: pointer;

        }

        .almanac-card-title {
            font-size: clamp(1.35rem, 4.4vmin, 2.9rem);

        .almanac-card-body {

<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
<script type="text/babel">

    class CurConditions extends React.Component {
        constructor(props) {
            super(props);
            this.state = {
                error: null,
                isLoaded: false,
                titleName: "TempTitleName",
                temp: 99,
                humidity: 88,
                WindSpeed: 77,
                WindDirShort: "NW",
                WindDirDegrees: 55,
                Rainfall: 3.21,
                HighTemp: 33,
                LowTemp: 22,
                FeelsLikeTemp: 11,
                AvgHighTemp: 99,
                AvgLowTemp: 88,
                SunriseTime: "06:54 AM",
                SunsetTime: "04:56 PM",
                SunriseTimeHour: 6,
                SunriseTimeMinute: 6,
                SunsetTimeHour: 5,
                SunsetTimeMinute: 5,
                MoonIllumination: 4,
                stationLocation: "Winterset",
                stateAbbreviation: "IA",
                currentIconCode: 30,
                isDay: true,
                // Location modal state
                showLocationModal: false,
                zipCodeInput: '',
                locationPreview: null,
                locationError: null,
                locationLoading: false
            };
        }

        componentDidMount() {
            // Load location from localStorage
            this.loadLocation();
            
            // Fetch data immediately on load
            this.getCurrWeatherValues();
            
            // Fetch climate normals once on page load (separate from refresh interval)
            this.getClimateNormals();

            // For locations without a PWS station, fetch Open-Meteo observed rainfall
            if (!LocationService.getStationId()) {
                this.getOpenMeteoRainfall();
            }

            // Fetch current conditions for background image (once on load)
            this.getCurrentConditions();

            // Set up interval to refresh every 5 minutes (300000 ms)
            this.refreshInterval = setInterval(() => {
                this.getCurrWeatherValues();
                if (!LocationService.getStationId()) {
                    this.getOpenMeteoRainfall();
                }
            }, 300000);

            // Reload the entire page every 30 minutes (1800000 ms)
            this.reloadInterval = setInterval(() => {
                window.location.reload();
            }, 1800000);
        }

        componentWillUnmount() {
            // Clean up intervals when component unmounts
            if (this.refreshInterval) {
                clearInterval(this.refreshInterval);
            }
            if (this.reloadInterval) {
                clearInterval(this.reloadInterval);
            }
        }
        
        // Load location from localStorage and update state
        loadLocation() {
            const location = LocationService.getLocation();
            this.setState({
                stationLocation: location.city,
                stateAbbreviation: location.state
            });
        }
        
        // Open the location change modal
        openLocationModal() {
            this.setState({
                showLocationModal: true,
                zipCodeInput: '',
                locationPreview: null,
                locationError: null
            });
        }
        
        // Close the location modal
        closeLocationModal() {
            this.setState({
                showLocationModal: false,
                zipCodeInput: '',
                locationPreview: null,
                locationError: null,
                locationLoading: false
            });
        }
        
        // Handle location input change (ZIP code or station ID)
        handleZipCodeChange(event) {
            const value = event.target.value.trim();
            this.setState({ zipCodeInput: value, locationError: null });
            
            // If first character is a letter, treat as station ID input
            if (/^[A-Za-z]/.test(value)) {
                // Station ID - lookup once 6+ chars entered
                if (this._lookupTimer) clearTimeout(this._lookupTimer);
                this.setState({ locationPreview: null });
                if (value.length >= 6) {
                    this._lookupTimer = setTimeout(() => {
                        this.lookupStationId(value);
                    }, 600);
                }
            } else {
                // ZIP code path - strip non-digits
                const zip = value.replace(/\D/g, '').slice(0, 5);
                if (zip !== value) {
                    this.setState({ zipCodeInput: zip });
                }
                if (zip.length === 5) {
                    this.lookupZipCode(zip);
                } else {
                    this.setState({ locationPreview: null });
                }
            }
        }
        
        // Look up station ID and show preview
        async lookupStationId(stationId) {
            this.setState({ locationLoading: true, locationError: null });
            
            try {
                const location = await LocationService.lookupStationId(stationId, CONFIG.WEATHER_COM_API_KEY);
                if (location) {
                    this.setState({
                        locationPreview: location,
                        locationLoading: false
                    });
                } else {
                    this.setState({
                        locationError: 'Station ID not found',
                        locationPreview: null,
                        locationLoading: false
                    });
                }
            } catch (e) {
                this.setState({
                    locationError: 'Error looking up station ID',
                    locationPreview: null,
                    locationLoading: false
                });
            }
        }
        
        // Look up ZIP code and show preview
        async lookupZipCode(zipCode) {
            this.setState({ locationLoading: true, locationError: null });
            
            try {
                const location = await LocationService.lookupZipCode(zipCode);
                if (location) {
                    this.setState({
                        locationPreview: location,
                        locationLoading: false
                    });
                } else {
                    this.setState({
                        locationError: 'ZIP code not found',
                        locationPreview: null,
                        locationLoading: false
                    });
                }
            } catch (e) {
                this.setState({
                    locationError: 'Error looking up ZIP code',
                    locationPreview: null,
                    locationLoading: false
                });
            }
        }
        
        // Save the new location
        async saveLocation() {
            const { zipCodeInput } = this.state;
            
            this.setState({ locationLoading: true });
            
            try {
                const location = await LocationService.updateLocation(
                    zipCodeInput,
                    CONFIG.WEATHER_COM_API_KEY
                );
                
                if (location) {
                    this.setState({
                        stationLocation: location.city,
                        stateAbbreviation: location.state,
                        showLocationModal: false,
                        locationLoading: false
                    });
                    
                    // Reload the page to fetch data for new location
                    window.location.reload();
                } else {
                    this.setState({
                        locationError: 'Could not save location',
                        locationLoading: false
                    });
                }
            } catch (e) {
                this.setState({
                    locationError: 'Error saving location',
                    locationLoading: false
                });
            }
        }
        
        getOpenMeteoRainfall() {
            const geocode = LocationService.getGeocode();
            const [lat, lon] = geocode.split(',');
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=precipitation_sum&timezone=auto&forecast_days=1`)
                .then(res => {
                    if (!res.ok) throw new Error(`Open-Meteo error: ${res.status}`);
                    return res.json();
                })
                .then(result => {
                    if (result && result.daily && result.daily.precipitation_sum) {
                        const mm = result.daily.precipitation_sum[0];
                        const inches = mm != null ? (mm / 25.4).toFixed(2) : '0';
                        this.setState({ Rainfall: inches });
                    }
                })
                .catch(error => {
                    console.error('Error fetching Open-Meteo rainfall:', error);
                });
        }

        getClimateNormals() {
            // Get today's date in YYYY-MM-DD format
            const today = new Date().toISOString().split('T')[0];
            const geocode = LocationService.getGeocode();
            
            fetch(`https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${geocode}/${today}?unitGroup=us&include=days,stats&key=${CONFIG.VISUAL_CROSSING_API_KEY}&contentType=json`)
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`Visual Crossing API error: ${res.status}`);
                    }
                    return res.json();
                })
                .then(
                    (result) => {
                        if (result && result.days && result.days[0] && result.days[0].normal) {
                            // normal array is [min, mean, max] - we want the mean (index 1)
                            const avgHigh = Math.round(result.days[0].normal.tempmax[1]);
                            const avgLow = Math.round(result.days[0].normal.tempmin[1]);
                            this.setState({
                                AvgHighTemp: avgHigh,
                                AvgLowTemp: avgLow
                            });
                        }
                    }
                )
                .catch((error) => {
                    console.error("Error fetching climate normals:", error);
                    // Keep default values if fetch fails
                });
        }

        // Fetch real-time current conditions for background image (runs once on page load)
        getCurrentConditions() {
            // Use World Weather Online API since it doesn't have CORS issues
            const queryParam = LocationService.getZipCode() || LocationService.getGeocode();
            fetch(`https://api.worldweatheronline.com/premium/v1/weather.ashx?q=${queryParam}&num_of_days=1&key=${CONFIG.WORLD_WEATHER_API_KEY}&format=json`)
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`WWO conditions API error: ${res.status}`);
                    }
                    return res.json();
                })
                .then(
                    (result) => {
                        if (!result || !result.data || !result.data.current_condition) {
                            console.warn("No current conditions data available");
                            return;
                        }
                        const current = result.data.current_condition[0];
                        const wwoCode = parseInt(current.weatherCode);
                        
                        // Map WWO weather codes to TWC icon codes
                        // WWO codes: https://www.worldweatheronline.com/developer/api/docs/weather-icons.aspx
                        const wwoToTwcIcon = {
                            113: 32, // Sunny/Clear
                            116: 30, // Partly cloudy
                            119: 26, // Cloudy
                            122: 26, // Overcast
                            143: 20, // Mist
                            176: 39, // Patchy rain
                            179: 41, // Patchy snow
                            182: 18, // Patchy sleet
                            185: 8,  // Patchy freezing drizzle
                            200: 47, // Thundery outbreaks
                            227: 15, // Blowing snow
                            230: 16, // Blizzard
                            248: 20, // Fog
                            260: 20, // Freezing fog
                            263: 9,  // Patchy light drizzle
                            266: 9,  // Light drizzle
                            281: 8,  // Freezing drizzle
                            284: 10, // Heavy freezing drizzle
                            293: 11, // Patchy light rain
                            296: 11, // Light rain
                            299: 12, // Moderate rain at times
                            302: 12, // Moderate rain
                            305: 40, // Heavy rain at times
                            308: 40, // Heavy rain
                            311: 10, // Light freezing rain
                            314: 10, // Moderate/heavy freezing rain
                            317: 18, // Light sleet
                            320: 18, // Moderate/heavy sleet
                            323: 13, // Patchy light snow
                            326: 13, // Light snow
                            329: 14, // Patchy moderate snow
                            332: 14, // Moderate snow
                            335: 16, // Patchy heavy snow
                            338: 16, // Heavy snow
                            350: 18, // Ice pellets
                            353: 39, // Light rain shower
                            356: 40, // Moderate/heavy rain shower
                            359: 40, // Torrential rain shower
                            362: 18, // Light sleet showers
                            365: 18, // Moderate/heavy sleet showers
                            368: 41, // Light snow showers
                            371: 42, // Moderate/heavy snow showers
                            374: 18, // Light showers of ice pellets
                            377: 18, // Moderate/heavy ice pellet showers
                            386: 47, // Patchy light rain with thunder
                            389: 47, // Moderate/heavy rain with thunder
                            392: 47, // Patchy light snow with thunder
                            395: 47, // Moderate/heavy snow with thunder
                        };
                        
                        const iconCode = wwoToTwcIcon[wwoCode] || 30; // Default to partly cloudy
                        
                        // Determine day/night from astronomy data
                        const astronomy = result.data.weather[0].astronomy[0];
                        const now = new Date();
                        const currentHour = now.getHours();
                        const currentMin = now.getMinutes();
                        
                        // Parse sunrise/sunset times (format: "07:15 AM")
                        const parseTime = (timeStr) => {
                            const match = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
                            if (!match) return 0;
                            let hour = parseInt(match[1]);
                            const min = parseInt(match[2]);
                            const period = match[3].toUpperCase();
                            if (period === 'PM' && hour !== 12) hour += 12;
                            if (period === 'AM' && hour === 12) hour = 0;
                            return hour * 60 + min;
                        };
                        
                        const sunriseMin = parseTime(astronomy.sunrise);
                        const sunsetMin = parseTime(astronomy.sunset);
                        const currentTotalMin = currentHour * 60 + currentMin;
                        
                        const isDay = currentTotalMin >= sunriseMin && currentTotalMin < sunsetMin;
                        
                        this.setState({ currentIconCode: iconCode, isDay: isDay });
                        this.updateBackground(iconCode, isDay);
                    }
                )
                .catch((error) => {
                    console.error("Error fetching current conditions:", error);
                    // Use default background on error
                });
        }

        // Choose background image based on weather icon code and day/night
        getBackgroundImage(iconCode, isDay) {
            // TWC icon codes: https://docs.google.com/document/d/1qpc4QN3YDpGaVMN-71tBEOi4s4tKE8jAQ3xFkcOQW8M
            // Snow icons: 5, 7, 13, 14, 15, 16, 17, 18, 41, 42, 43, 46
            // Rain icons: 4, 6, 8, 9, 10, 11, 12, 35, 37, 38, 39, 40, 45, 47
            // Cloudy icons: 26, 27, 28
            // Partly cloudy: 29, 30
            // Clear/Sunny: 31, 32, 33, 34, 36
            
            const snowCodes = [5, 7, 13, 14, 15, 16, 17, 18, 41, 42, 43, 46];
            const rainCodes = [4, 6, 8, 9, 10, 11, 12, 35, 37, 38, 39, 40, 45, 47];
            const cloudyCodes = [26, 27, 28];
            const partlyCloudyCodes = [29, 30];
            const clearCodes = [31, 32, 33, 34, 36];

            if (isDay) {
                if (snowCodes.includes(iconCode)) return 'Images/DaySnow.png';
                if (rainCodes.includes(iconCode)) return 'Images/DayRain.png';
                if (cloudyCodes.includes(iconCode)) return 'Images/DayCloudy.png';
                if (partlyCloudyCodes.includes(iconCode)) return 'Images/DayPartlyCloudy.png';
                return 'Images/DaySunny.png';  // Default for clear/sunny
            } else {
                if (snowCodes.includes(iconCode)) return 'Images/NightSnow.png';
                if (rainCodes.includes(iconCode)) return 'Images/NightCloudy.png';  // No NightRain, use cloudy
                if (cloudyCodes.includes(iconCode) || partlyCloudyCodes.includes(iconCode)) return 'Images/NightCloudy.png';
                return 'Images/NightClear.png';  // Default for clear
            }
        }

        updateBackground(iconCode, isDay) {
            const bgImage = this.getBackgroundImage(iconCode, isDay);
            document.body.style.setProperty('background-image', `url('${bgImage}')`, 'important');
            // Also update the #container element which covers the body
            const container = document.getElementById('container');
            if (container) {
                container.style.setProperty('background-image', `url('${bgImage}')`, 'important');
            }
        }

        getCurrWeatherValues() {
            const stationId = LocationService.getStationId();
            const geocode = LocationService.getGeocode();
            const queryParam = LocationService.getZipCode() || LocationService.getGeocode();
            
            if (stationId) {
                fetch(`https://api.weather.com/v2/pws/observations/current?stationId=${stationId}&format=json&units=e&apiKey=${CONFIG.WEATHER_COM_API_KEY}`)
                    .then(res => {
                        if (!res.ok) {
                            throw new Error(`PWS API error: ${res.status}`);
                        }
                        return res.json();
                    })
                    .then(
                        (result) => {
                            if (result && result.observations && result.observations[0]) {
                                const obs = result.observations[0];
                                this.setState({
                                    isLoaded: true,
                                    temp: obs.imperial.temp,
                                    WindSpeed: obs.imperial.windSpeed,
                                    WindDirDegrees: obs.winddir,
                                    Rainfall: obs.imperial.precipTotal,
                                    humidity: obs.humidity
                                });
                            } else {
                                console.warn("PWS data not available for station:", stationId);
                                this.setState({ isLoaded: true });
                            }
                        }
                    )
                    .catch((error) => {
                        console.error("Error fetching PWS data:", error);
                        this.setState({ isLoaded: true });
                    });
            } else {
                console.warn("No PWS station available for this location");
                this.setState({ isLoaded: true });
            }

            // Try to get high/low from chart data (if already loaded), otherwise listen for it
            if (window.chartDailyData) {
                this.setState({
                    isLoaded: true,
                    HighTemp: Math.round(window.chartDailyData.dailyMax[0]),
                    LowTemp: Math.round(window.chartDailyData.dailyMin[0])
                });
            } else {
                // Listen for chart data to be ready
                window.addEventListener('chartDataReady', () => {
                    if (window.chartDailyData) {
                        this.setState({
                            HighTemp: Math.round(window.chartDailyData.dailyMax[0]),
                            LowTemp: Math.round(window.chartDailyData.dailyMin[0])
                        });
                    }
                }, { once: true });
            }


            fetch(`https://api.worldweatheronline.com/premium/v1/weather.ashx?q=${queryParam}&num_of_days=3&key=${CONFIG.WORLD_WEATHER_API_KEY}&format=json`)
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`WWO API error: ${res.status}`);
                    }
                    return res.json();
                })
                .then(
                    (result) => {
                        if (result && result.data && result.data.current_condition) {
                            const wwo = result.data.current_condition[0];
                            this.setState(prev => ({
                                isLoaded: true,
                                FeelsLikeTemp: wwo.FeelsLikeF,
                                WindDirShort: wwo.winddir16Point,
                                // Fall back to WWO for any PWS value that is missing or zero
                                temp:           (prev.temp == null)                             ? wwo.temp_F                    : prev.temp,
                                WindSpeed:      (prev.WindSpeed == null || prev.WindSpeed == 0)  ? wwo.windspeedMiles             : prev.WindSpeed,
                                WindDirDegrees: (prev.WindDirDegrees == null)                   ? wwo.winddirDegree              : prev.WindDirDegrees,
                                humidity:       (prev.humidity == null)                         ? wwo.humidity                   : prev.humidity,
                                Rainfall:       (prev.Rainfall == null)                         ? '0'                            : prev.Rainfall,
                                SunriseTime: result.data.weather[0].astronomy[0].sunrise,
                                SunsetTime: result.data.weather[0].astronomy[0].sunset,
                                MoonphaseText: result.data.weather[0].astronomy[0].sunrise,
                                MoonIllumination: result.data.weather[0].astronomy[0].moon_illumination
                            }));
                        }
                    }
                )
                .catch((error) => {
                    console.error("Error fetching WWO data:", error);
                });

        }

        render() {

            const { error, isLoaded, items } = this.state;
            if (error) {
                return <div>Error: {error.message}</div>;
            } else if (!isLoaded) {
                return <div>Loading...</div>;
            } else {
                //console.log("Window width x height = " + window.innerWidth + " x " + window.innerHeight);
                //console.log("Rainfall = " + this.state.Rainfall);
                var RainGaugeIcon = "";

                var almSunriseTime = this.state.SunriseTime;
                if (almSunriseTime.substring(0,1) == "0") almSunriseTime = almSunriseTime.substring(1,5);
                let almSunsetTime = this.state.SunsetTime;
                if (almSunsetTime.substring(0,1) == "0") almSunsetTime = almSunsetTime.substring(1,5);

                var Rainfall = "0";
                var RainfallNum = Number(this.state.Rainfall);
                var RainfallString = parseFloat(this.state.Rainfall).toFixed(2).toString();
                if (RainfallNum > 0 && RainfallNum < 1) {
                    Rainfall = RainfallString.substring(1,4);
                }
                else if (RainfallNum >= 1) {
                    Rainfall = RainfallString;
                }

                //set rain gauge icon
                if (RainfallNum <= 0) {RainGaugeIcon = "Images/RainGaugeEmpty.png";}
                else if (RainfallNum <= .1) {RainGaugeIcon = "Images/RainGauge10.png";}
                else if (RainfallNum <= .2) {RainGaugeIcon = "Images/RainGauge20.png";}
                else if (RainfallNum <= .3) {RainGaugeIcon = "Images/RainGauge30.png";}
                else if (RainfallNum <= .4) {RainGaugeIcon = "Images/RainGauge40.png";}
                else if (RainfallNum <= .5) {RainGaugeIcon = "Images/RainGauge50.png";}
                else if (RainfallNum <= .6) {RainGaugeIcon = "Images/RainGauge60.png";}
                else if (RainfallNum <= .7) {RainGaugeIcon = "Images/RainGauge70.png";}
                else if (RainfallNum <= .8) {RainGaugeIcon = "Images/RainGauge80.png";}
                else if (RainfallNum <= .9) {RainGaugeIcon = "Images/RainGauge90.png";}
                else if (RainfallNum <= 1) {RainGaugeIcon = "Images/RainGauge100.png";}
                else if (RainfallNum > 1) {RainGaugeIcon = "Images/RainGaugeFull.png";}

                let HumidityIcon = "Images/Humid100.png";
                if (this.state.humidity > 94) {HumidityIcon = "Images/Humid100.png";}
                else if (this.state.humidity > 84) {HumidityIcon = "Images/Humid90.png";}
                else if (this.state.humidity > 74) {HumidityIcon = "Images/Humid80.png";}
                else if (this.state.humidity > 64) {HumidityIcon = "Images/Humid70.png";}
                else if (this.state.humidity > 54) {HumidityIcon = "Images/Humid60.png";}
                else if (this.state.humidity > 44) {HumidityIcon = "Images/Humid50.png";}
                else if (this.state.humidity > 34) {HumidityIcon = "Images/Humid40.png";}
                else if (this.state.humidity > 24) {HumidityIcon = "Images/Humid30.png";}
                else if (this.state.humidity > 14) {HumidityIcon = "Images/Humid20.png";}
                else {HumidityIcon = "Humid10.png";}

                //sets temp color based on simple range logic
                var CurrTempColor = "Red";
                if (this.state.FeelsLikeTemp  < 25) {CurrTempColor = "blue";}
                else if (this.state.FeelsLikeTemp < 50) {CurrTempColor = "blue";}
                else if (this.state.FeelsLikeTemp < 70) {CurrTempColor = "orange";}
                else if (this.state.FeelsLikeTemp < 85) {CurrTempColor = "red";}

                var currDate = new Date();
                var DayOfWeekList = ['Sun', 'Mon', 'Tues', 'Wed', 'Thur', 'Fri', 'Sat'];
                var MonthList = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sept', 'Oct', 'Nov', 'Dec'];
                var DayPostfix = [,'st', 'nd', 'rd', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'st', 'nd', 'rd', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'st'];
                var currDateString = DayOfWeekList[currDate.getDay()] + ", " + MonthList[currDate.getMonth()] + " " + currDate.getDate() + DayPostfix[currDate.getDate()];

                return (
                    <div>
                        {/* Temperature Circle - Modern CSS */}
                        <div className="temp-circle" style={{'--temp-color': CurrTempColor}}>
                            <div className="hi-lo">{this.state.HighTemp}° | {this.state.LowTemp}°</div>
                            <div className="current-temp">{this.state.temp}<span className="degree">°</span></div>
                            <div className="feels-like">Feels like {this.state.FeelsLikeTemp}°</div>
                        </div>
                        <div className="css-location" onClick={() => this.openLocationModal()}>
                            {this.state.stationLocation}, {this.state.stateAbbreviation}
                        </div>
                        <div className="radar-btn" onClick={() => window.location.href='RadarMap.html'} title="Weather Radar">
                            Weather<br/>Radar
                        </div>

                        {/* Wind Card - Modern CSS */}
                        <div className="wind-card">
                            <div className="wind-card-label">Wind</div>
                            <div className="wind-card-body">
                                <div className="wind-card-left">
                                    <img className="wind-dir-arrow" src="Images/WindDirArrowWhite.png" alt="Wind direction" style={{transform: `rotate(${this.state.WindDirDegrees}deg)`}} />
                                    <div className="wind-dir-text">{this.state.WindDirShort}</div>
                                </div>
                                <div className="wind-card-right">
                                    <div className="wind-speed">{this.state.WindSpeed}</div>
                                    <div className="wind-uom">mph</div>
                                </div>
                            </div>
                        </div>

                        {/* Humidity Card - Modern CSS */}
                        <div className="humidity-card">
                            <div className="humidity-card-label">Humidity</div>
                            <div className="humidity-card-body">
                                <div className="humidity-card-left">
                                    <img className="humidity-icon" src={HumidityIcon} alt="Humidity level" />
                                </div>
                                <div className="humidity-card-right">
                                    <div className="humidity-value">{this.state.humidity}</div>
                                    <div className="humidity-uom">percent</div>
                                </div>
                            </div>
                        </div>

                        {/* Rainfall Card - Modern CSS */}
                        <div className="rainfall-card" onClick={() => window.location.href='RainfallHistory.html'}>
                            <div className="rainfall-card-label">Rainfall</div>
                            <div className="rainfall-card-body">
                                <div className="rainfall-card-left">
                                    <img className="rainfall-icon" src={RainGaugeIcon} alt="Rain gauge" />
                                </div>
                                <div className="rainfall-card-right">
                                    <div className="rainfall-value">{Rainfall}</div>
                                    <div className="rainfall-uom">inches</div>
                                </div>
                            </div>
                        </div>

                        {/* Almanac Card - Modern CSS */}
                        <div className="almanac-card" onClick={() => window.location.href='Almanac.html'}>
                            <div className="almanac-card-title">{currDateString}</div>
                            <div className="almanac-card-body">
                                <div className="almanac-col">
                                    <div className="almanac-label">Sunrise</div>
                                    <div className="almanac-value">{almSunriseTime}</div>
                                    <div className="almanac-label">Sunset</div>
                                    <div className="almanac-value">{almSunsetTime}</div>
                                </div>
                                <div className="almanac-col">
                                    <div className="almanac-label">Avg High</div>
                                    <div className="almanac-value">{this.state.AvgHighTemp}°</div>
                                    <div className="almanac-label">Avg Low</div>
                                    <div className="almanac-value">{this.state.AvgLowTemp}°</div>
                                </div>
                            </div>
                        </div>
                        
                        {/* Location Change Modal */}
                        {this.state.showLocationModal && (
                            <div className="location-modal-overlay" onClick={() => this.closeLocationModal()}>
                                <div className="location-modal" onClick={(e) => e.stopPropagation()}>
                                    <h2>Change Location</h2>
                                    <div style={{color: '#888', fontSize: '13px', marginBottom: '12px', textAlign: 'center'}}>Enter a ZIP code or Weather Underground station ID</div>
                                    <input
                                        type="text"
                                        placeholder="Enter ZIP code or WU station ID"
                                        value={this.state.zipCodeInput}
                                        onChange={(e) => this.handleZipCodeChange(e)}
                                        autoFocus
                                    />
                                    {this.state.locationError && (
                                        <div className="location-modal-error">{this.state.locationError}</div>
                                    )}
                                    <div className="location-modal-preview">
                                        {this.state.locationLoading && 'Looking up...'}
                                        {this.state.locationPreview && (
                                            <span>{this.state.locationPreview.city}, {this.state.locationPreview.state}</span>
                                        )}
                                    </div>
                                    <div className="location-modal-buttons">
                                        <button className="cancel" onClick={() => this.closeLocationModal()}>Cancel</button>
                                        <button 
                                            className="save" 
                                            onClick={() => this.saveLocation()}
                                            disabled={!this.state.locationPreview || this.state.locationLoading}
                                        >
                                            Save
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    /*
                    <ul>
                      <h1> The temp in Winterset is {this.state.temp} </h1>
                      <h2> and the humidity is {this.state.humidity} </h2>
                    </ul>
                    */
                );
            }
        }
    }


    ReactDOM.render(<CurConditions />, document.getElementById('container'));
    //body.style.backgroundImage = 'url("https://www.stockvault.net/data/2008/08/18/106178/preview16.jpg")';

</script>
</body>

    body {
        background-color: black;
    }
