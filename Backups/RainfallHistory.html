<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Rainfall History</title>
    
    <!-- Load Luxon core first -->
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>

    <!-- Load Chart.js next (UMD version is critical) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Chart.js annotation plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

    <!-- Then load the Chart.js Luxon adapter -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>

    <!-- Include configuration file (API keys) -->
    <script src="config.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            font-family: Calibri, sans-serif;
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            cursor: pointer;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            padding: 20px;
        }

        .title {
            text-align: center;
            font-size: 28px;
            color: #4488ff;
            padding: 20px 0;
        }

        .chart-container {
            flex: 1;
            position: relative;
            min-height: 0;
            padding: 20px;
        }

        .chart-container canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .loading {
            text-align: center;
            font-size: 20px;
            color: #888;
            padding-top: 100px;
        }
    </style>
</head>

<body onclick="window.location.href='TestSetState.html'">
    <div class="main-container">
        <div class="title">Daily Rainfall (Past 7 Days)</div>
        <div class="chart-container">
            <canvas id="rainfallChart"></canvas>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            
            // Fetch rainfall history from Visual Crossing (past 7 days)
            async function getRainfallHistory() {
                try {
                    // Get dates for past 7 days
                    const today = luxon.DateTime.now().setZone('local');
                    const startDate = today.minus({ days: 6 }).toFormat('yyyy-MM-dd');
                    const endDate = today.toFormat('yyyy-MM-dd');
                    
                    const url = `https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${CONFIG.GEOCODE}/${startDate}/${endDate}?unitGroup=us&include=days&key=${CONFIG.VISUAL_CROSSING_API_KEY}&contentType=json`;
                    
                    const response = await fetch(url);
                    const result = await response.json();
                    
                    return result.days.map(day => ({
                        date: day.datetime,
                        precip: day.precip || 0
                    }));
                } catch (error) {
                    console.error("Error fetching rainfall history:", error);
                    return [];
                }
            }

            const rainfallData = await getRainfallHistory();
            
            if (rainfallData.length === 0) {
                document.querySelector('.chart-container').innerHTML = '<div class="loading">Unable to load rainfall data</div>';
                return;
            }

            // Prepare chart data
            const labels = rainfallData.map(d => luxon.DateTime.fromISO(d.date).toFormat('ccc M/d'));
            const precipValues = rainfallData.map(d => d.precip);

            // Create the bar chart
            const ctx = document.getElementById('rainfallChart').getContext('2d');
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Rainfall (inches)',
                        data: precipValues,
                        backgroundColor: 'rgba(68, 136, 255, 0.7)',
                        borderColor: 'rgba(68, 136, 255, 1)',
                        borderWidth: 1,
                        borderRadius: 4,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            grid: {
                                color: '#555555',
                            },
                            ticks: {
                                color: 'white',
                                font: {
                                    size: 14
                                }
                            }
                        },
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: '#555555',
                            },
                            ticks: {
                                color: '#4488ff',
                                font: {
                                    size: 14
                                },
                                callback: function(value) {
                                    return value.toFixed(2) + '"';
                                }
                            },
                            title: {
                                display: true,
                                text: 'Rainfall (inches)',
                                color: '#4488ff',
                                font: {
                                    size: 18
                                }
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.parsed.y.toFixed(2) + ' inches';
                                }
                            }
                        }
                    }
                }
            });
        });
    </script>
</body>

</html>
