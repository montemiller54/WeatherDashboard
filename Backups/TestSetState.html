<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
<script type="text/babel">

    class CurConditions extends React.Component {
        constructor(props) {
            super(props);
            this.state = {
                error: null,
                isLoaded: false,
                titleName: "TempTitleName",
                temp: 99,
                humidity: 88,
                WindSpeed: 77,
                WindDirShort: "NW",
                WindDirDegrees: 55,
                Rainfall: 3.21,
                HighTemp: 33,
                LowTemp: 22,
                FeelsLikeTemp: 11,
                AvgHighTemp: 99,
                AvgLowTemp: 88,
                SunriseTime: "06:54 AM",
                SunsetTime: "04:56 PM",
                SunriseTimeHour: 6,
                SunriseTimeMinute: 6,
                SunsetTimeHour: 5,
                SunsetTimeMinute: 5,
                MoonIllumination: 4,
                stationLocation: "Winterset",
                currentIconCode: 30,
                isDay: true
            };
        }

        componentDidMount() {
            // Fetch data immediately on load
            this.getCurrWeatherValues();
            
            // Fetch climate normals once on page load (separate from refresh interval)
            this.getClimateNormals();

            // Fetch current conditions for background image (once on load)
            this.getCurrentConditions();

            // Set up interval to refresh every 5 minutes (300000 ms)
            this.refreshInterval = setInterval(() => {
                this.getCurrWeatherValues();
            }, 300000);

            // Reload the entire page every 30 minutes (1800000 ms)
            this.reloadInterval = setInterval(() => {
                window.location.reload();
            }, 1800000);
        }

        componentWillUnmount() {
            // Clean up intervals when component unmounts
            if (this.refreshInterval) {
                clearInterval(this.refreshInterval);
            }
            if (this.reloadInterval) {
                clearInterval(this.reloadInterval);
            }
        }
        
        getClimateNormals() {
            // Get today's date in YYYY-MM-DD format
            const today = new Date().toISOString().split('T')[0];
            
            fetch(`https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${CONFIG.GEOCODE}/${today}?unitGroup=us&include=days,stats&key=${CONFIG.VISUAL_CROSSING_API_KEY}&contentType=json`)
                .then(res => res.json())
                .then(
                    (result) => {
                        // normal array is [min, mean, max] - we want the mean (index 1)
                        const avgHigh = Math.round(result.days[0].normal.tempmax[1]);
                        const avgLow = Math.round(result.days[0].normal.tempmin[1]);
                        this.setState({
                            AvgHighTemp: avgHigh,
                            AvgLowTemp: avgLow
                        });
                    },
                    (error) => {
                        console.error("Error fetching climate normals:", error);
                        // Keep default values if fetch fails
                    }
                );
        }

        // Fetch real-time current conditions for background image (runs once on page load)
        getCurrentConditions() {
            // Use World Weather Online API since it doesn't have CORS issues
            fetch(`https://api.worldweatheronline.com/premium/v1/weather.ashx?q=${CONFIG.ZIP_CODE}&num_of_days=1&key=${CONFIG.WORLD_WEATHER_API_KEY}&format=json`)
                .then(res => res.json())
                .then(
                    (result) => {
                        const current = result.data.current_condition[0];
                        const wwoCode = parseInt(current.weatherCode);
                        
                        // Map WWO weather codes to TWC icon codes
                        // WWO codes: https://www.worldweatheronline.com/developer/api/docs/weather-icons.aspx
                        const wwoToTwcIcon = {
                            113: 32, // Sunny/Clear
                            116: 30, // Partly cloudy
                            119: 26, // Cloudy
                            122: 26, // Overcast
                            143: 20, // Mist
                            176: 39, // Patchy rain
                            179: 41, // Patchy snow
                            182: 18, // Patchy sleet
                            185: 8,  // Patchy freezing drizzle
                            200: 47, // Thundery outbreaks
                            227: 15, // Blowing snow
                            230: 16, // Blizzard
                            248: 20, // Fog
                            260: 20, // Freezing fog
                            263: 9,  // Patchy light drizzle
                            266: 9,  // Light drizzle
                            281: 8,  // Freezing drizzle
                            284: 10, // Heavy freezing drizzle
                            293: 11, // Patchy light rain
                            296: 11, // Light rain
                            299: 12, // Moderate rain at times
                            302: 12, // Moderate rain
                            305: 40, // Heavy rain at times
                            308: 40, // Heavy rain
                            311: 10, // Light freezing rain
                            314: 10, // Moderate/heavy freezing rain
                            317: 18, // Light sleet
                            320: 18, // Moderate/heavy sleet
                            323: 13, // Patchy light snow
                            326: 13, // Light snow
                            329: 14, // Patchy moderate snow
                            332: 14, // Moderate snow
                            335: 16, // Patchy heavy snow
                            338: 16, // Heavy snow
                            350: 18, // Ice pellets
                            353: 39, // Light rain shower
                            356: 40, // Moderate/heavy rain shower
                            359: 40, // Torrential rain shower
                            362: 18, // Light sleet showers
                            365: 18, // Moderate/heavy sleet showers
                            368: 41, // Light snow showers
                            371: 42, // Moderate/heavy snow showers
                            374: 18, // Light showers of ice pellets
                            377: 18, // Moderate/heavy ice pellet showers
                            386: 47, // Patchy light rain with thunder
                            389: 47, // Moderate/heavy rain with thunder
                            392: 47, // Patchy light snow with thunder
                            395: 47, // Moderate/heavy snow with thunder
                        };
                        
                        const iconCode = wwoToTwcIcon[wwoCode] || 30; // Default to partly cloudy
                        
                        // Determine day/night from astronomy data
                        const astronomy = result.data.weather[0].astronomy[0];
                        const now = new Date();
                        const currentHour = now.getHours();
                        const currentMin = now.getMinutes();
                        
                        // Parse sunrise/sunset times (format: "07:15 AM")
                        const parseTime = (timeStr) => {
                            const match = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
                            if (!match) return 0;
                            let hour = parseInt(match[1]);
                            const min = parseInt(match[2]);
                            const period = match[3].toUpperCase();
                            if (period === 'PM' && hour !== 12) hour += 12;
                            if (period === 'AM' && hour === 12) hour = 0;
                            return hour * 60 + min;
                        };
                        
                        const sunriseMin = parseTime(astronomy.sunrise);
                        const sunsetMin = parseTime(astronomy.sunset);
                        const currentTotalMin = currentHour * 60 + currentMin;
                        
                        const isDay = currentTotalMin >= sunriseMin && currentTotalMin < sunsetMin;
                        
                        this.setState({ currentIconCode: iconCode, isDay: isDay });
                        this.updateBackground(iconCode, isDay);
                        
                        console.log("Current conditions - WWO code:", wwoCode, "Icon:", iconCode, "Day:", isDay);
                    },
                    (error) => {
                        console.error("Error fetching current conditions:", error);
                        // Use default background on error
                    }
                );
        }

        // Choose background image based on weather icon code and day/night
        getBackgroundImage(iconCode, isDay) {
            // TWC icon codes: https://docs.google.com/document/d/1qpc4QN3YDpGaVMN-71tBEOi4s4tKE8jAQ3xFkcOQW8M
            // Snow icons: 5, 7, 13, 14, 15, 16, 17, 18, 41, 42, 43, 46
            // Rain icons: 4, 6, 8, 9, 10, 11, 12, 35, 37, 38, 39, 40, 45, 47
            // Cloudy icons: 26, 27, 28
            // Partly cloudy: 29, 30
            // Clear/Sunny: 31, 32, 33, 34, 36
            
            const snowCodes = [5, 7, 13, 14, 15, 16, 17, 18, 41, 42, 43, 46];
            const rainCodes = [4, 6, 8, 9, 10, 11, 12, 35, 37, 38, 39, 40, 45, 47];
            const cloudyCodes = [26, 27, 28];
            const partlyCloudyCodes = [29, 30];
            const clearCodes = [31, 32, 33, 34, 36];

            if (isDay) {
                if (snowCodes.includes(iconCode)) return 'Images/DaySnow.png';
                if (rainCodes.includes(iconCode)) return 'Images/DayRain.png';
                if (cloudyCodes.includes(iconCode)) return 'Images/DayCloudy.png';
                if (partlyCloudyCodes.includes(iconCode)) return 'Images/DayPartlyCloudy.png';
                return 'Images/DaySunny.png';  // Default for clear/sunny
            } else {
                if (snowCodes.includes(iconCode)) return 'Images/NightSnow.png';
                if (rainCodes.includes(iconCode)) return 'Images/NightCloudy.png';  // No NightRain, use cloudy
                if (cloudyCodes.includes(iconCode) || partlyCloudyCodes.includes(iconCode)) return 'Images/NightCloudy.png';
                return 'Images/NightClear.png';  // Default for clear
            }
        }

        updateBackground(iconCode, isDay) {
            const bgImage = this.getBackgroundImage(iconCode, isDay);
            document.body.style.setProperty('background-image', `url('${bgImage}')`, 'important');
            // Also update the #container element which covers the body
            const container = document.getElementById('container');
            if (container) {
                container.style.setProperty('background-image', `url('${bgImage}')`, 'important');
            }
            console.log("Background updated to:", bgImage);
        }

        getCurrWeatherValues() {
            fetch(`https://api.weather.com/v2/pws/observations/current?stationId=${CONFIG.STATION_ID}&format=json&units=e&apiKey=${CONFIG.WEATHER_COM_API_KEY}`)
                //fetch("http://api.worldweatheronline.com/premium/v1/weather.ashx?q=50069&num_of_days=1&key=5839874882a546b583b205552230312&format=json")
                .then(res => res.json())
                .then(
                    (result) => {
                        this.setState({
                            isLoaded: true,
                            //titleName: result.title
                            temp: result.observations[0].imperial.temp,
                            WindSpeed: result.observations[0].imperial.windSpeed,
                            WindDirDegrees: result.observations[0].winddir,
                            Rainfall: result.observations[0].imperial.precipTotal,
                            humidity: result.observations[0].humidity

                        });
                    },
                    // Note: it's important to handle errors here
                    // instead of a catch() block so that we don't swallow
                    // exceptions from actual bugs in components.
                    (error) => {
                        this.setState({
                            isLoaded: true,
                            error
                        });
                    }
                )

            fetch(`https://api.weather.com/v3/wx/forecast/daily/5day?geocode=${CONFIG.GEOCODE}&format=json&units=e&language=en-US&apiKey=${CONFIG.WEATHER_COM_API_KEY}`)
                .then(res => res.json())
                .then(
                    (result) => {
                        this.setState({
                            isLoaded: true,
                            HighTemp: result.calendarDayTemperatureMax[0],
                            LowTemp: result.calendarDayTemperatureMin[0]

                        });

                    },
                    // Note: it's important to handle errors here
                    // instead of a catch() block so that we don't swallow
                    // exceptions from actual bugs in components.
                    (error) => {
                        this.setState({
                            isLoaded: true,
                            error
                        });
                    }
                )


            fetch(`https://api.worldweatheronline.com/premium/v1/weather.ashx?q=${CONFIG.ZIP_CODE}&num_of_days=3&key=${CONFIG.WORLD_WEATHER_API_KEY}&format=json`)
                .then(res => res.json())
                .then(
                    (result) => {
                        this.setState({
                            isLoaded: true,
                            FeelsLikeTemp: result.data.current_condition[0].FeelsLikeF,
                            WindDirShort: result.data.current_condition[0].winddir16Point,

                            SunriseTime: result.data.weather[0].astronomy[0].sunrise,
                            SunsetTime: result.data.weather[0].astronomy[0].sunset,
                            MoonphaseText: result.data.weather[0].astronomy[0].sunrise,
                            MoonIllumination: result.data.weather[0].astronomy[0].moon_illumination
                        });
                    },
                    // Note: it's important to handle errors here
                    // instead of a catch() block so that we don't swallow
                    // exceptions from actual bugs in components.
                    (error) => {
                        this.setState({
                            isLoaded: true,
                            error
                        });
                    }
                )

        }

        render() {

            const { error, isLoaded, items } = this.state;
            if (error) {
                return <div>Error: {error.message}</div>;
            } else if (!isLoaded) {
                return <div>Loading...</div>;
            } else {
                //console.log("Window width x height = " + window.innerWidth + " x " + window.innerHeight);
                //console.log("Rainfall = " + this.state.Rainfall);
                let circleScaleFactor = .96;
                let screenRatio = window.innerWidth/window.innerHeight;
                let textScaleFactor = window.innerHeight/500;
                if (screenRatio < 1) {textScaleFactor = window.innerWidth/750;}
                let viewBoxValues = "0 0 " + window.innerWidth + " " + window.innerHeight;
                //let viewBoxValues = "0 0 1200 800";


                let tempCircleX = window.innerWidth/2;
                let tempCircleRadiusSizeWidth = .15;
                let tempCircleRadiusSizeHeight = .19;
                let tempCircleRadius = circleScaleFactor * Math.min(window.innerWidth * tempCircleRadiusSizeWidth, window.innerHeight * tempCircleRadiusSizeHeight);
                let tempCircleY = tempCircleRadius * 1.35;
                let cityStateTextX = tempCircleX;
                let cityStateTextY = tempCircleY + tempCircleRadius + (25 * textScaleFactor);
                let tempCircleTempTextX = tempCircleX;
                let tempCircleTempTextY = tempCircleY + (30 * textScaleFactor);
                let tempCircleColor = "blue";
                let tempCircleHiTextX = tempCircleX - (tempCircleRadius * .40);
                let tempCircleHiTextY = tempCircleY - (tempCircleRadius * .55);
                let tempCircleLowTextX = tempCircleX + (tempCircleRadius * .11);
                let tempCircleLowTextY = tempCircleY - (tempCircleRadius * .55);
                let tempCircleFeelsTextX = tempCircleX - (tempCircleRadius * .10);
                let tempCircleFeelsTextY = tempCircleY + (tempCircleRadius * .68);


                let currConditionsRectWidth = 100;
                let currConditionsRectHeight = 100;
                if(screenRatio > 1) {
                    currConditionsRectHeight = window.innerHeight/4.4;
                    currConditionsRectWidth = currConditionsRectHeight * 1.5;
                }
                else {
                    currConditionsRectWidth = window.innerWidth/5;
                    currConditionsRectHeight = currConditionsRectWidth / 1.5;
                }

                let humidRectX = Math.min (window.innerWidth/50, window.innerHeight/50);
                let humidRectY = Math.min (window.innerWidth/50, window.innerHeight/50);
                let humidTextX = humidRectX + (.7 * currConditionsRectWidth);
                let humidTextY = humidRectY + (.77 * currConditionsRectHeight);
                let humidLabelX = humidRectX + (.5 * currConditionsRectWidth);
                let humidLabelY = humidRectX + (.20 * currConditionsRectHeight);
                let humidUoMX = humidTextX;
                let humidUoMY = humidRectY + (.95 * currConditionsRectHeight);
                let humidIconX = humidRectX + (.1 * currConditionsRectWidth);
                let humidIconY = humidRectY + (.20 * currConditionsRectHeight);

                let rainRectX = window.innerWidth - currConditionsRectWidth - humidRectX;
                let rainRectY = humidRectY;
                let rainTextX = rainRectX + (.7 * currConditionsRectWidth);
                let rainTextY = rainRectY + (.77 * currConditionsRectHeight);
                let rainLabelX = rainRectX + (.5 * currConditionsRectWidth);
                let rainLabelY = rainRectY + (.20 * currConditionsRectHeight);
                let rainUoMX = rainTextX;
                let rainUoMY = rainRectY + (.95 * currConditionsRectHeight);
                let rainIconX = rainRectX + (.1 * currConditionsRectWidth);
                let rainIconY = rainRectY + (.28 * currConditionsRectHeight);
                var RainGaugeIcon = "";

                let windRectX = Math.min (window.innerWidth/50, window.innerHeight/50);
                let windRectY = (humidRectY * 2) + currConditionsRectHeight;
                let windTextX = windRectX + (.7 * currConditionsRectWidth);
                let windTextY = windRectY + (.77 * currConditionsRectHeight);
                let windLabelX = windRectX + (.5 * currConditionsRectWidth);
                let windLabelY = windRectY + (.20 * currConditionsRectHeight);
                let windUoMX = windTextX;
                let windUoMY = windRectY + (.95 * currConditionsRectHeight);
                let windDirShortTextY = windUoMY * .97;
                let windDirShortTextX = windRectX + (.25 * currConditionsRectWidth);
                let windDirIconX = windRectX + (currConditionsRectWidth * .13);
                let windDirIconY = windRectY + (currConditionsRectHeight * .27)

                let almRectX = window.innerWidth - currConditionsRectWidth - humidRectX;
                let almRectY = windRectY;
                let almLabelX = almRectX + (.5 * currConditionsRectWidth);
                let almLabelY = almRectY + (.20 * currConditionsRectHeight);
                let almSunriseLabelX = almRectX + (.25 * currConditionsRectWidth);
                let almSunriseLabelY = almRectY + (.36 * currConditionsRectHeight);
                let almSunsetLabelX = almRectX + (.25 * currConditionsRectWidth);
                let almSunsetLabelY = almRectY + (.70 * currConditionsRectHeight);
                let almSunriseTimeX = almSunriseLabelX;
                let almSunriseTimeY = almRectY + (.56 * currConditionsRectHeight);
                let almSunsetTimeX = almSunsetLabelX;
                let almSunsetTimeY = almRectY + (.90 * currConditionsRectHeight);
                var almSunriseTime = this.state.SunriseTime;
                if (almSunriseTime.substring(0,1) == "0") almSunriseTime = almSunriseTime.substring(1,5);
                let almSunsetTime = this.state.SunsetTime;
                if (almSunsetTime.substring(0,1) == "0") almSunsetTime = almSunsetTime.substring(1,5);
                let almAvgHighLabelX = almRectX + (.75 * currConditionsRectWidth);
                let almAvgHighLabelY = almSunriseLabelY;
                let almAvgLowLabelX = almRectX + (.75 * currConditionsRectWidth);
                let almAvgLowLabelY = almSunsetLabelY;
                let almAvgHighTextX = almRectX + (.78 * currConditionsRectWidth);
                let almAvgHighTextY = almSunriseTimeY;
                let almAvgLowTextX = almRectX + (.78 * currConditionsRectWidth);
                let almAvgLowTextY = almSunsetTimeY;

                var Rainfall = "0";
                var RainfallNum = Number(this.state.Rainfall);
                var RainfallString = parseFloat(this.state.Rainfall).toFixed(2).toString();
                if (RainfallNum > 0 && RainfallNum < 1) {
                    Rainfall = RainfallString.substring(1,4);
                }
                else if (RainfallNum >= 1) {
                    Rainfall = RainfallString;
                }

                //set rain gauge icon
                if (RainfallNum <= 0) {RainGaugeIcon = "Images/RainGaugeEmpty.png";}
                else if (RainfallNum <= .1) {RainGaugeIcon = "Images/RainGauge10.png";}
                else if (RainfallNum <= .2) {RainGaugeIcon = "Images/RainGauge20.png";}
                else if (RainfallNum <= .3) {RainGaugeIcon = "Images/RainGauge30.png";}
                else if (RainfallNum <= .4) {RainGaugeIcon = "Images/RainGauge40.png";}
                else if (RainfallNum <= .5) {RainGaugeIcon = "Images/RainGauge50.png";}
                else if (RainfallNum <= .6) {RainGaugeIcon = "Images/RainGauge60.png";}
                else if (RainfallNum <= .7) {RainGaugeIcon = "Images/RainGauge70.png";}
                else if (RainfallNum <= .8) {RainGaugeIcon = "Images/RainGauge80.png";}
                else if (RainfallNum <= .9) {RainGaugeIcon = "Images/RainGauge90.png";}
                else if (RainfallNum <= 1) {RainGaugeIcon = "Images/RainGauge100.png";}
                else if (RainfallNum > 1) {RainGaugeIcon = "Images/RainGaugeFull.png";}

                let HumidityIcon = "Images/Humid100.png";
                if (this.state.humidity > 94) {HumidityIcon = "Images/Humid100.png";}
                else if (this.state.humidity > 84) {HumidityIcon = "Images/Humid90.png";}
                else if (this.state.humidity > 74) {HumidityIcon = "Images/Humid80.png";}
                else if (this.state.humidity > 64) {HumidityIcon = "Images/Humid70.png";}
                else if (this.state.humidity > 54) {HumidityIcon = "Images/Humid60.png";}
                else if (this.state.humidity > 44) {HumidityIcon = "Images/Humid50.png";}
                else if (this.state.humidity > 34) {HumidityIcon = "Images/Humid40.png";}
                else if (this.state.humidity > 24) {HumidityIcon = "Images/Humid30.png";}
                else if (this.state.humidity > 14) {HumidityIcon = "Images/Humid20.png";}
                else {HumidityIcon = "Humid10.png";}

                //sets temp color based on simple range logic
                var CurrTempColor = "Red";
                if (this.state.FeelsLikeTemp  < 25) {CurrTempColor = "blue";}
                else if (this.state.FeelsLikeTemp < 50) {CurrTempColor = "blue";}
                else if (this.state.FeelsLikeTemp < 70) {CurrTempColor = "orange";}
                else if (this.state.FeelsLikeTemp < 85) {CurrTempColor = "red";}

                var currDate = new Date();
                var DayOfWeekList = ['Sun', 'Mon', 'Tues', 'Wed', 'Thur', 'Fri', 'Sat'];
                var MonthList = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sept', 'Oct', 'Nov', 'Dec'];
                var DayPostfix = [,'st', 'nd', 'rd', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'st', 'nd', 'rd', 'th', 'th', 'th', 'th', 'th', 'th', 'th', 'st'];
                var currDateString = DayOfWeekList[currDate.getDay()] + ", " + MonthList[currDate.getMonth()] + " " + currDate.getDate() + DayPostfix[currDate.getDate()];

                return (
                    <div>
                        <svg top="500" left="0" height="100%" width="100%" viewBox={viewBoxValues}>
                            <g fontFamily="Calibri">
                                <text x={cityStateTextX} y={cityStateTextY} textAnchor="middle" fontSize={18*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill="#a0a0a0">{this.state.stationLocation}, IA</text>
                                <circle cx={tempCircleX} cy={tempCircleY} r={tempCircleRadius} stroke={CurrTempColor} strokeWidth={10*textScaleFactor} fill="black" fillOpacity="0.8"></circle>
                                <text x={tempCircleTempTextX} y={tempCircleTempTextY} textAnchor="middle" fontSize={90*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill={CurrTempColor}>{this.state.temp}</text>
                                <text x={tempCircleHiTextX} y={tempCircleHiTextY} fontSize={20*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill="gray">{this.state.HighTemp}° | </text>
                                <text x={tempCircleLowTextX} y={tempCircleLowTextY} fontSize={20*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill="gray">{this.state.LowTemp}°</text>
                                <text x={tempCircleTempTextX + 42 * textScaleFactor} y={tempCircleTempTextY - 35 * textScaleFactor} fontSize={38*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill={CurrTempColor}> °</text>
                                <text x={tempCircleFeelsTextX} y={tempCircleFeelsTextY} textAnchor="middle" fontSize={16*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill="gray">Feels like {this.state.FeelsLikeTemp}°</text>
                            </g>
                            <g fontFamily="Calibri">
                                <rect x={humidRectX} y={humidRectY} rx={15*textScaleFactor} ry={15*textScaleFactor} width={currConditionsRectWidth} height={currConditionsRectHeight} fill="black" fillOpacity="0.8" />
                                <text x={humidTextX} y={humidTextY} textAnchor="middle"  fontSize={75*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill="#00b050">{this.state.humidity}</text>
                                <text x={humidLabelX} y={humidLabelY} textAnchor="middle" fontWeight="bold" fontSize={25*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill="#00b050">Humidity</text>
                                <text x={humidUoMX} y={humidUoMY} textAnchor="middle"  fontSize={18*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill="#00b050">percent</text>
                                <image href={HumidityIcon} x={humidIconX} y={humidIconY} height={90 * textScaleFactor} width={50 * textScaleFactor}/>
                            </g>
                            <g fontFamily="Calibri">
                                <rect x={windRectX} y={windRectY} rx={15*textScaleFactor} ry={15*textScaleFactor} width={currConditionsRectWidth} height={currConditionsRectHeight} fill="black" fillOpacity="0.8" />
                                <text x={windTextX} y={windTextY} textAnchor="middle" fontSize={75*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill="#6688cc">{this.state.WindSpeed}</text>
                                <text x={windLabelX} y={windLabelY} textAnchor="middle" fontWeight="bold" fontSize={25*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill="#6688cc">Wind</text>
                                <text x={windUoMX} y={windUoMY} textAnchor="middle" fontSize={18*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill="#6688cc">mph</text>
                                <text x={windDirShortTextX} y={windDirShortTextY} textAnchor="middle" fontSize={18*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill="#6688cc">{this.state.WindDirShort}</text>
                                <image href="Images/WindDirArrowWhite.png" x={windDirIconX} y={windDirIconY} height={50 * textScaleFactor} width={50 * textScaleFactor} transform={"rotate(" + this.state.WindDirDegrees + ", " + (windDirIconX + (25 * textScaleFactor)) + ", " + (windDirIconY + (25 * textScaleFactor)) + ")"}/>
                            </g>
                            <g fontFamily="Calibri" style={{cursor: 'pointer'}} onClick={() => window.location.href='RainfallHistory.html'}>
                                <rect x={rainRectX} y={rainRectY} rx={15*textScaleFactor} ry={15*textScaleFactor} width={currConditionsRectWidth} height={currConditionsRectHeight} fill="black" fillOpacity="0.8" />
                                <text x={rainTextX} y={rainTextY} textAnchor="middle" fontSize={65*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill="blue">{Rainfall}</text>
                                <text x={rainLabelX} y={rainLabelY} textAnchor="middle" fontWeight="bold" fontSize={25*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill="blue">Rainfall</text>
                                <text x={rainUoMX} y={rainUoMY} textAnchor="middle" fontSize={18*textScaleFactor} style={{ fontFamily: 'Calibri, sans-serif' }} fill="blue">inches</text>
                                <image href={RainGaugeIcon} x={rainIconX} y={rainIconY} height={76 * textScaleFactor} width={50 * textScaleFactor}/>
                            </g>
                            <g fontFamily="Calibri" style={{cursor: 'pointer'}} onClick={() => window.location.href='Almanac.html'}>
                                <rect x={almRectX} y={almRectY} rx={15*textScaleFactor} ry={15*textScaleFactor} width={currConditionsRectWidth} height={currConditionsRectHeight} style={{ fontFamily: 'Calibri, sans-serif' }} fill="black" fillOpacity="0.8" />
                                <text x={almLabelX} y={almLabelY} textAnchor="middle" style={{ fontFamily: 'Calibri, sans-serif' }} fontSize={22*textScaleFactor} fontWeight="bold" fill="#C9D1D9">{currDateString}</text>
                                <text x={almSunriseLabelX} y={almSunriseLabelY} textAnchor="middle" style={{ fontFamily: 'Calibri, sans-serif' }} fontSize={12*textScaleFactor} fill="#8B949E">Sunrise</text>
                                <text x={almSunsetLabelX} y={almSunsetLabelY} textAnchor="middle" style={{ fontFamily: 'Calibri, sans-serif' }} fontSize={12*textScaleFactor} fill="#8B949E">Sunset</text>
                                <text x={almSunriseTimeX} y={almSunriseTimeY} textAnchor="middle" style={{ fontFamily: 'Calibri, sans-serif' }} fontSize={24*textScaleFactor} fill="#E6EDF3">{almSunriseTime}</text>
                                <text x={almSunsetTimeX} y={almSunsetTimeY} textAnchor="middle" style={{ fontFamily: 'Calibri, sans-serif' }} fontSize={24*textScaleFactor} fill="#E6EDF3">{almSunsetTime}</text>
                                <text x={almAvgHighLabelX} y={almAvgHighLabelY} textAnchor="middle" style={{ fontFamily: 'Calibri, sans-serif' }} fontSize={12*textScaleFactor} fill="#8B949E">Avg High</text>
                                <text x={almAvgLowLabelX} y={almAvgLowLabelY} textAnchor="middle" style={{ fontFamily: 'Calibri, sans-serif' }} fontSize={12*textScaleFactor} fill="#8B949E">Avg Low</text>
                                <text x={almAvgHighTextX} y={almAvgHighTextY} textAnchor="middle" style={{ fontFamily: 'Calibri, sans-serif' }} fontSize={24*textScaleFactor} fill="#E6EDF3">{this.state.AvgHighTemp}°</text>
                                <text x={almAvgLowTextX} y={almAvgLowTextY} textAnchor="middle" style={{ fontFamily: 'Calibri, sans-serif' }} fontSize={24*textScaleFactor} fill="#E6EDF3">{this.state.AvgLowTemp}°</text>
                            </g>
                        </svg>
                    </div>
                    /*
                    <ul>
                      <h1> The temp in Winterset is {this.state.temp} </h1>
                      <h2> and the humidity is {this.state.humidity} </h2>
                    </ul>
                    */
                );
            }
        }
    }


    ReactDOM.render(<CurConditions />, document.getElementById('container'));
    //body.style.backgroundImage = 'url("https://www.stockvault.net/data/2008/08/18/106178/preview16.jpg")';

</script>
</body>

<style>
    body {
        background-image: url('Images/NightClear.png');
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-size: 100% 100%;
    }
</style>

</html>
