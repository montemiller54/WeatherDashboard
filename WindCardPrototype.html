<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind Card - Modern CSS Prototype</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('Images/NightClear.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            font-family: Calibri, sans-serif;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, #1a1a3e, #0a0a1a);
            z-index: -1;
        }

        .wind-card {
            position: absolute;
            bottom: 45%;
            left: 2vmin;
            width: clamp(144px, 33.6vmin, 408px);
            aspect-ratio: 1.3 / 1;
            background: rgba(0, 0, 0, 0.8);
            border-radius: clamp(10px, 1.8vmin, 24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Calibri, sans-serif;
            color: #6688cc;
        }

        .wind-card-label {
            font-size: clamp(1.68rem, 5.52vmin, 3.48rem);
            font-weight: bold;
            margin-top: 4%;
        }

        .wind-card-body {
            display: flex;
            flex: 1;
            width: 100%;
            align-items: flex-start;
            padding-top: 2%;
        }

        .wind-card-left {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8%;
        }

        .wind-dir-arrow {
            width: clamp(42px, 9vmin, 102px);
            height: clamp(42px, 9vmin, 102px);
            transition: transform 0.5s ease;
        }

        .wind-dir-text {
            font-size: clamp(1.08rem, 2.88vmin, 1.8rem);
            margin-top: 14%;
        }

        .wind-card-right {
            flex: 0 0 60%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .wind-speed {
            font-size: clamp(3.6rem, 11.4vmin, 7.8rem);
            line-height: 0.9;
        }

        .wind-uom {
            font-size: clamp(1.08rem, 2.88vmin, 1.8rem);
            margin-top: 0.2em;
        }

        /* Demo controls */
        .demo-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .demo-controls label {
            display: block;
            margin-bottom: 8px;
        }

        .demo-controls input[type="range"] {
            width: 150px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="wind-card">
        <div class="wind-card-label">Wind</div>
        <div class="wind-card-body">
            <div class="wind-card-left">
                <img class="wind-dir-arrow" id="windArrow" src="Images/WindDirArrowWhite.png" alt="Wind direction">
                <div class="wind-dir-text" id="windDirText">NW</div>
            </div>
            <div class="wind-card-right">
                <div class="wind-speed" id="windSpeed">12</div>
                <div class="wind-uom">mph</div>
            </div>
        </div>
    </div>

    <!-- Demo controls -->
    <div class="demo-controls">
        <label>
            Speed: <span id="speedValue">12</span> mph
            <input type="range" id="speedSlider" min="0" max="60" value="12">
        </label>
        <label>
            Direction: <span id="dirValue">315</span>°
            <input type="range" id="dirSlider" min="0" max="360" value="315">
        </label>
        <p style="margin-top: 10px; color: #888; font-size: 12px;">
            Try resizing the browser window!
        </p>
    </div>

    <script>
        const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE',
                            'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];

        function degreesToCompass(deg) {
            const index = Math.round(deg / 22.5) % 16;
            return directions[index];
        }

        const speedSlider = document.getElementById('speedSlider');
        const dirSlider = document.getElementById('dirSlider');
        const speedValue = document.getElementById('speedValue');
        const dirValue = document.getElementById('dirValue');
        const windSpeed = document.getElementById('windSpeed');
        const windArrow = document.getElementById('windArrow');
        const windDirText = document.getElementById('windDirText');

        speedSlider.addEventListener('input', function() {
            const speed = parseInt(this.value);
            speedValue.textContent = speed;
            windSpeed.textContent = speed;
        });

        dirSlider.addEventListener('input', function() {
            const deg = parseInt(this.value);
            dirValue.textContent = deg;
            windArrow.style.transform = `rotate(${deg}deg)`;
            windDirText.textContent = degreesToCompass(deg);
        });

        // Initialize arrow rotation
        windArrow.style.transform = 'rotate(315deg)';
    </script>
</body>
</html>
