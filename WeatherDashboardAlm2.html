    //this function gets JSON file specified in url argument. Got this from stackoverflow
    var getJSON = function(url, callback) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.responseType = 'json';
        xhr.onload = function() {
          var status = xhr.status;
          if (status === 200) {
            callback(null, xhr.response);
          } else {
            callback(status, xhr.response);
          }
        };
        xhr.send();
        return callback;
    };

    // --- STATIC DEMO DATA (Weather Underground API no longer functional) ---
    (function() {

      var historyObservations = [];
      var histBase = new Date();
      histBase.setHours(histBase.getHours() - 24, 0, 0, 0);
      for (var h = 0; h < 288; h++) {
        var hdt = new Date(histBase.getTime() + h * 5 * 60000);
        var hhr = hdt.getHours();
        // Sine-curve temp: ~45F pre-dawn, peaks ~67F around 2pm
        var ht = Math.round(45 + Math.max(0, Math.sin((hhr - 5) / 18 * Math.PI)) * 22);
        historyObservations.push({
          date: {
            year: hdt.getFullYear().toString(),
            mon: (hdt.getMonth() + 1).toString(),
            mday: hdt.getDate().toString(),
            hour: hdt.getHours().toString()
          },
          tempi: ht.toString()
        });
      }

      var weekNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        var baseHigh = 67 - dayOff;
        var ft = Math.round((baseHigh - 15) + Math.max(0, Math.sin((fhr - 5) / 18 * Math.PI)) * 20);
        var fpop = (dayOff === 3 && fhr >= 12 && fhr <= 20) ? 65 : (dayOff === 6 ? 45 : 10);

            hour_padded: pad2(fdt.getHours()),
            weekday_name_abbrev: weekNames[fdt.getDay()]

        }
        console.log("gothere3");

        forecastdata.push([new Date(wudata.history.observations[i*12].date.year + "-" + wudata.history.observations[i*12].date.mon + "-" + wudata.history.observations[i*12].date.mday + "T" + wudata.history.observations[i*12].date.hour + ":00:00-06:00"), undefined, undefined, Number(wudata.current_observation.temp_f), undefined, LightOrDark, 32]);
        forecastdata.push([new Date(wudata.history.observations[i*12].date.year + "-" + wudata.history.observations[i*12].date.mon + "-" + wudata.history.observations[i*12].date.mday + "T" + wudata.history.observations[i*12].date.hour + ":00:00-06:00"), undefined, undefined, undefined, Number(wudata.current_observation.temp_f), LightOrDark, 32]);
        forecastdata.push([new Date(wudata.history.observations[i*12].date.year + "-" + wudata.history.observations[i*12].date.mon + "-" + wudata.history.observations[i*12].date.mday + "T" + wudata.history.observations[i*12].date.hour + ":00:00-06:00"), Number(wudata.current_observation.temp_f), undefined, undefined, undefined, LightOrDark, 32]);
      }

      //initialize variables for daily highs and lows
      var DailyMaxTemp = [Number(wudata.forecast.simpleforecast.forecastday[0].high.fahrenheit),-100, -100,-100,-100,-100,-100,-100,-100,-100,-100,-100];
      var DailyMinTemp = [Number(wudata.forecast.simpleforecast.forecastday[0].low.fahrenheit),200,200,200,200,200,200,200,200,200,200,200];
      var DailyDayName = [];

              DailyPrecip[DayIndex] += 200;
